<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>乱数表</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <script src="list.js" defer></script>
</head>
<body>
<main class="list-main">
  <h1>乱数表</h1>
  <p><a href="index.html">総当たりツールへ戻る</a></p>
  <p>開始Fへ直接ジャンプします。6400億Fなどの大きな値も先頭から生成しません。表はクリックで1行、Ctrl/Cmd+クリックで複数行を選択できます。</p>

  <section aria-labelledby="list-settings">
    <h2 id="list-settings">表示設定</h2>
    <div class="grid">
      <label>初期seed<input id="listSeed" type="text" value="0x32769"></label>
      <label>開始F<input id="listStart" type="text" value="0" inputmode="numeric"></label>
      <label>終了F（最大5000行）<input id="listEnd" type="text" value="100" inputmode="numeric"></label>
      <label>倍率 max（小数10桁まで）<input id="listMax" type="text" value="100" inputmode="decimal" pattern="[0-9]+(?:\.[0-9]{1,10})?"></label>
      <label class="wide">整数化式
        <select id="listFormula">
          <option value="exact">2^32−1式: floor(top32 × max ÷ (2^32−1))</option>
          <option value="compat">互換式: floor(top32 × max ÷ 2^32)</option>
        </select>
      </label>
    </div>
    <p>上位32-bitの刻み幅に基づき、小数は10桁までです。どちらの式もBigIntで整数除算します。総当たりツールと「よ／こ」列は互換式・max=100です。</p>
    <button id="showList" class="primary" type="button">指定Fへジャンプして表示</button>
    <p id="listStatus" class="status" aria-live="polite"></p>
  </section>

  <div class="table-wrap list-table-wrap">
    <table id="randomTable">
      <thead><tr><th>F</th><th>64-bit乱数</th><th>上位32-bit</th><th>値</th><th>よ／こ</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</main>
</body>
</html>
